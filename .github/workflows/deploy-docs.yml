name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "quartz.config.ts"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout TerrainX
        uses: actions/checkout@v4

      - name: Checkout Quartz v4
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: _quartz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: _quartz/package-lock.json

      - name: Install Quartz dependencies
        working-directory: _quartz
        run: npm ci

      - name: Copy docs as Quartz content
        run: |
          rm -rf _quartz/content
          cp -r docs _quartz/content

      - name: Copy Quartz config
        run: cp quartz.config.ts _quartz/quartz.config.ts

      - name: Build site
        working-directory: _quartz
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
